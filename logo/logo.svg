<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- outer rim: bright top-left arc, fading to soft dark at bottom-right, like a glass lens edge -->
    <linearGradient id="rimOuter" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#F2FAFF" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#AFC6D4" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#3B4A54" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0E151B" stop-opacity="0.75"/>
    </linearGradient>

    <!-- very faint glass body fill, mostly transparent -->
    <radialGradient id="glassFill" cx="38%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#D9E8F0" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#8FA3AE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0E151B" stop-opacity="0.22"/>
    </radialGradient>

    <!-- top specular arc highlight -->
    <linearGradient id="specular" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- checkmark stroke, pale glass-cyan -->
    <linearGradient id="checkStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5FBFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#CBE3EC" stop-opacity="0.90"/>
    </linearGradient>

    <filter id="blurSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>

    <filter id="checkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circleClip">
      <circle cx="128" cy="128" r="108"/>
    </clipPath>
  </defs>

  <!-- transparent canvas: only the glass ring + fill + checkmark render -->

  <!-- very subtle glass body -->
  <circle cx="128" cy="128" r="108" fill="url(#glassFill)"/>

  <!-- inner shading + top highlight, clipped so nothing spills outside the circle -->
  <g clip-path="url(#circleClip)">
    <path d="M 40 84 A 96 96 0 0 1 216 84" fill="none" stroke="url(#specular)" stroke-width="20" stroke-linecap="round" opacity="0.80" filter="url(#blurSoft)"/>
    <ellipse cx="82" cy="76" rx="26" ry="14" fill="#FFFFFF" opacity="0.40" filter="url(#blurSoft)"/>
    <ellipse cx="128" cy="205" rx="110" ry="46" fill="#000000" opacity="0.10" filter="url(#blurSoft)"/>
  </g>

  <!-- outer rim ring, thin, double-edge glass look -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="url(#rimOuter)" stroke-width="3.5"/>
  <circle cx="128" cy="128" r="104" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>

  <!-- checkmark -->
  <g filter="url(#checkGlow)">
    <path d="M92 132 L118 158 L166 100" fill="none" stroke="url(#checkStroke)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
